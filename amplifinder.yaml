# AmpliFinder Default Configuration (amplifinder.yaml)
# Bundled defaults — override by copying to ~/.amplifinder/amplifinder.yaml

# External tool paths (null = use system PATH)
blast_path: null
samtools_path: null
bowtie2_path: null

# breseq settings
breseq_docker: true

# ISfinder database (null = use bundled)
isdb_path: null
isfinder_cache: null

# ISEScan settings
isescan_env_name: isescan  # Conda env name, or null to use current environment
