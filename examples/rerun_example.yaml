# Example: Complete run configuration that can be used standalone
# Usage: amplifinder --config rerun_example.yaml

# Required parameters
iso_path: /path/to/isolate.fastq
ref_name: U00096

# Optional: ancestor for normalized coverage
anc_path: /path/to/ancestor.fastq

# Output settings
output_dir: output
ref_path: genomesDB

# Sample names (auto-derived from paths if not specified)
iso_name: my_isolate
anc_name: my_ancestor

# Analysis parameters
threads: 8
copy_number_threshold: 1.5
del_copy_number_threshold: 0.3
use_isfinder: false
create_plots: true

# Advanced settings
min_amplicon_length: 30
max_amplicon_length: 1000000
filter_amplicon_length: 100
average_method: median
